<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Contact — AgriRent</title>

        <!-- Same shared CSS file as every other page -->
        <link rel="stylesheet" href="style.css">

        <!-- Google Fonts: Poppins -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,300;0,400;0,500;0,600;0,700;0,800;1,100&display=swap" rel="stylesheet">
    </head>
    <body>

        <!-- ══ PAGE HEADER ════════════════════════════════════════
             Shorter banner for inner pages (sub-header class).
        ═══════════════════════════════════════════════════════════ -->
        <section class="sub-header">

            <!-- Navigation bar — same on every page -->
            <nav>
                <a href="index.html"><img src="Images/Logo.png" alt="logo"></a>
                <div class="nav-links">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="services.html">Services</a></li>
                        <!-- class="active" marks this as the current page -->
                        <li><a href="contact.html" class="active">Contact</a></li>
                    </ul>
                </div>
            </nav>

            <!-- Page title shown in the banner -->
            <div class="text-box">
                <h1>Contact Us</h1>
            </div>

        </section>

        <!-- ══ CONTACT FORM SECTION ═══════════════════════════════
             A simple form for visitors to send a message.
             NOTE: To make this form actually send emails you will
             need a back-end service (e.g. Formspree or PHP).
             For now it is HTML-only and shows the layout.
        ═══════════════════════════════════════════════════════════ -->
        <section class="contact">
            <h1>Get In Touch</h1>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. <br>
               vel sapien eget nunc efficitur bibendum.</p>

            <!-- Contact form -->
            <!-- action="#" means it does nothing for now — replace with
                 your form handler URL when you add a back-end -->
            <form class="contact-form" action="#" method="POST">

                <!-- Full name field -->
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name"
                       placeholder="Enter your full name" required>

                <!-- Email field -->
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email"
                       placeholder="Enter your email address" required>

                <!-- Subject field -->
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject"
                       placeholder="What is this about?" required>

                <!-- Message field — textarea allows multiple lines -->
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6"
                          placeholder="Write your message here..." required></textarea>

                <!-- Submit button -->
                <button type="submit" class="hero-btn">Send Message</button>

            </form>
        </section>

        <!-- ══ CONTACT INFO SECTION ═══════════════════════════════
             Address, phone, and email details shown below the form.
        ═══════════════════════════════════════════════════════════ -->
        <section class="inventry">
            <h1>Our Details</h1>

            <div class="row">
                <div class="Rent-col">
                    <h3>📍 Address</h3>
                    <p>15 Industrial Drive<br>
                       May Pen, Clarendon<br>
                       Jamaica</p>
                </div>
                <div class="Maintenance-col">
                    <h3>📞 Phone & Email</h3>
                    <p>1-876-123-4567<br>
                       info@agrirent.com</p>
                </div>
            </div>
        </section>

    </body>
</html>
