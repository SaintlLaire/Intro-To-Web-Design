<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory — My Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Shared stylesheet (all CSS lives here — one file for all pages) -->
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>

    <!-- ================================================
       NAVIGATION BAR
       Floating pill navbar — fixed at the top.
       "Home" link is marked .active so it appears bold/green.
       The same nav block appears on every page.
  ================================================ -->
    <nav>
        <!-- Brand logo / name (links back to home) -->
        <a href="../index.html" class="nav-brand">AgriRent</a>

        <!-- Page navigation links -->
        <ul class="nav-links">
            <li><a href="../index.html" class="active">Home</a></li>
            <li><a href="../pages/about.html">About</a></li>
            <li><a href="../pages/services.html">Services</a></li>
            <li><a href="../pages/store.html">Store</a></li>
        </ul>

        <!-- Right-side CTA button (links to contact page) -->
        <a href="../pages/contact.html" class="nav-cta">Contact Us</a>
    </nav>

    <div class="container mt-4">
        <div class="store-heading">
            <h1 class="">Our Inventory</h1>
            <p class="text-muted">Browse our selection of products available for rent.</p>
        </div>
        <!-- Filters -->
        <div class="filter-bar d-flex flex-column flex-md-row gap-3 align-items-md-center">
            <input type="text" id="searchInput" class="form-control" placeholder="🔍  Search products...">
            <select id="categoryFilter" class="form-select" style="max-width:220px;">
                <option value="all">All Categories</option>
                <option value="Manual Tools">Manual Tools</option>
                <option value="Automated Tools">Automated Tools</option>
            </select>
        </div>

        <!-- Products -->
        <div id="productContainer" class="row g-4"></div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const products = [
            {
                id: 1,
                name: "Lawn Tiller",
                price: 1200,
                category: "Manual Tools",
                description: "A durable gardening tool used to loosen and prepare soil for planting. The lawn tiller makes it easier to mix soil, remove weeds, and improve soil conditions for healthier crops and gardens.",
                image: "../images/lawn_tiller.jpg"
            },
            {
                id: 2,
                name: "Plant watering can",
                price: 300,
                category: "Manual Tools",
                description: "A lightweight and easy-to-use watering can designed for watering flowers, vegetables, and plants. It provides a gentle and controlled water flow, making it perfect for home gardens and small farming projects.",
                image: "../images/plant_watering_can.jpg"
            },
            {
                id: 3,
                name: "Wheelbarrow",
                price: 1500,
                category: "Manual Tools",
                description: "A sturdy transport tool used for carrying soil, fertilizer, plants, harvested crops, and farming materials. The wheelbarrow helps reduce heavy lifting and improves efficiency when working on farms or in gardens.",
                image: "../images/wheelbarrow.jpg"
            },
            {
                id: 4,
                name: "Weeder",
                price: 1250,
                category: "Manual Tools",
                description: "A practical hand tool designed to remove weeds from gardens and farming areas without damaging surrounding plants. The weeder helps maintain clean and healthy soil for better crop growth.",
                image: "../images/weeder.jpg"
            },
            {
                id: 5,
                name: "Garden Hose",
                price: 800,
                category: "Manual Tools",
                description: "A durable and efficient garden hose for watering plants and maintaining your garden.",
                image: "../images/garden_hose.jpg"
            },
            {
                id: 6,
                name: "Lawn mower",
                price: 1500,
                category: "Automated Tools",
                description: "A powerful and versatile lawn mower for efficient grass cutting.",
                image: "../images/lawn_mower.jpg"
            },
            {
                id: 7,
                name: "Compact Tractor",
                price: 15000,
                category: "Automated Tools",
                description: "A powerful and versatile farming machine designed for land preparation, ploughing, hauling, and other agricultural tasks. The compact tractor is ideal for small to medium-sized farms and helps farmers complete work quickly and efficiently.",
                image: "../images/compact_tractor.jpg"
            }
        ];

        const PLACEHOLDER = "https://placehold.co/400x200?text=";

        function loadProducts(productList = products) {
            const container = document.getElementById("productContainer");
            container.innerHTML = "";

            if (productList.length === 0) {
                container.innerHTML = `
                <div class="col-12 empty-state">
                    <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
                    </svg>
                    <p>No products match your search.</p>
                </div>`;
                return;
            }

            productList.forEach(product => {
                const col = document.createElement("div");
                col.className = "col-sm-6 col-md-4";
                col.innerHTML = `
                <div class="card product-card h-100">
                    <img src="${product.image}"
                         class="card-img-top"
                         alt="${product.name}"
                         onerror="this.onerror=null;this.src='${PLACEHOLDER}${encodeURIComponent(product.name)}'">
                    <div class="card-body d-flex flex-column gap-2">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title mb-0">${product.name}</h5>
                            <span class="category-badge">${product.category}</span>
                        </div>
                        <p class="product-price mb-0">$${product.price.toLocaleString()}</p>
                        <button class="btn btn-details mt-auto" onclick="viewProduct(${product.id})" style="background-color: #2d6a3f">
                            View Details
                        </button>
                    </div>
                </div>`;
                container.appendChild(col);
            });
        }

        function viewProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            localStorage.setItem("selectedProduct", JSON.stringify(product));
            window.location.href = "../pages/product_details.html";
        }

        function applyFilters() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const category = document.getElementById("categoryFilter").value;
            const filtered = products.filter(p =>
                p.name.toLowerCase().includes(search) &&
                (category === "all" || p.category === category)
            );
            loadProducts(filtered);
        }

        loadProducts();
        document.getElementById("searchInput").addEventListener("keyup", applyFilters);
        document.getElementById("categoryFilter").addEventListener("change", applyFilters);
    </script>
</body>

</html>
